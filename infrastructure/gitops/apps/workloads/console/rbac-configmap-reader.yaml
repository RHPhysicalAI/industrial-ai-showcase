---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: policy-version-reader
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["policy-version"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: showcase-console-backend-policy-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: policy-version-reader
subjects:
- kind: ServiceAccount
  name: showcase-console-backend
  namespace: fleet-ops
