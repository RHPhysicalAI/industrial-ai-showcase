# This project was developed with assistance from AI tools.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ogx-config
  namespace: agentic-ops
  labels:
    app.kubernetes.io/name: ogx-hil
    app.kubernetes.io/part-of: agentic-orchestrator
    ogx.io/watch: "true"  # Required for OGX operator to discover ConfigMap
data:
  config.yaml: |
    version: "2"
    image_name: rh

    # APIs for OGX
    # Phase 3: inference + tool_runtime + responses (with guardrails)
    apis:
      - inference
      - tool_runtime
      - responses

    providers:
      inference:
        - provider_id: ${env.VLLM_URL:+vllm-inference}
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_URL:=}
            max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
            api_token: ${env.VLLM_API_TOKEN:=fake}
            tls_verify: ${env.VLLM_TLS_VERIFY:=false}
            refresh_models: ${env.VLLM_REFRESH_MODELS:=false}
            network:
              tls:
                verify: false
              timeout:
                connect: 1200
                read: 1200

      tool_runtime:
        - provider_id: mcp-mlflow
          provider_type: remote::model-context-protocol
          config:
            url: http://mcp-mlflow-server.agentic-ops.svc.cluster.local:8080
        - provider_id: mcp-fleet
          provider_type: remote::model-context-protocol
          config:
            url: http://mcp-fleet-server.agentic-ops.svc.cluster.local:8080

      responses:
        - provider_id: builtin
          provider_type: inline::builtin
          config:
            moderation_endpoint: ${env.LLAMA_GUARD_URL:=http://llama-guard.agentic-ops.svc.cluster.local:8000/v1/moderations}
            moderation_headers:
              Content-Type: application/json

      vector_io:
        - provider_id: default
          provider_type: inline::faiss
          config:
            storage_path: /.ogx/vectors

    models:
      - metadata:
          llm_type: llm
          model_id: meta-llama/Meta-Llama-3-8B-Instruct
          provider_id: vllm-inference

    storage:
      backends:
        kv_default:
          type: kv_sqlite
          db_path: /.ogx/kvstore.db
        sql_default:
          type: sql_sqlite
          db_path: /.ogx/sqlstore.db

      stores:
        metadata:
          type: kv
          backend: kv_default
          namespace: registry

        inference:
          type: sql
          backend: sql_default
          table_name: inference
          max_write_queue_size: 10000
          num_writers: 4

    server:
      port: 8321
