# This project was developed with assistance from AI tools.
apiVersion: ogx.io/v1beta1
kind: OGXServer
metadata:
  name: ogx-hil
  namespace: agentic-ops
  labels:
    app.kubernetes.io/name: ogx-hil
    app.kubernetes.io/part-of: agentic-orchestrator
    app.kubernetes.io/component: governance
    phase: "3"
    milestone: "3"
  annotations:
    description: "OGX (Open GenAI Stack) governance layer for HIL approval, guardrails, and safety checks (ADR-019)"
spec:
  # Distribution - use rh (full distribution with Agents API)
  distribution:
    name: rh

  # Use overrideConfig for full config control (SQLite instead of PostgreSQL)
  overrideConfig:
    name: ogx-config
    key: config.yaml

  # Workload configuration
  workload:
    replicas: 1

    # Storage for OGX data (SQLite database will be stored here)
    storage:
      size: "5Gi"
      mountPath: "/.ogx"

    # Environment variables
    overrides:
      env:
        - name: VLLM_URL
          value: "http://vllm-agent-brain.agentic-ops.svc.cluster.local:8000"

  # Network configuration
  network:
    externalAccess:
      enabled: false  # Internal only, no Route
