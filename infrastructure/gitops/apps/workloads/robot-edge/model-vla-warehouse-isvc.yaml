apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vla-warehouse
  namespace: robot-edge
  annotations:
    # NOTE: Using HF placeholder model for showcase demos.
    # Production uses s3://mlflow/models/vla-warehouse/vX.Y from training pipeline.
spec:
  predictor:
    serviceAccountName: vla-warehouse-sa
    tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: L40S_SHARED
      effect: NoSchedule
    model:
      modelFormat:
        name: vllm
      # Showcase mode: HF placeholder (fast startup, no training required)
      # Production mode: s3://mlflow/models/vla-warehouse/v1.4
      storageUri: hf://microsoft/Phi-3-mini-4k-instruct
      resources:
        limits:
          nvidia.com/gpu: '1'
          cpu: '4'
          memory: 16Gi
        requests:
          nvidia.com/gpu: '1'
          cpu: '2'
          memory: 8Gi
