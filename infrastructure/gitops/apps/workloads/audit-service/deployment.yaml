# This project was developed with assistance from AI tools.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: agentic-ops
  labels:
    app: audit-service
    phase: "3"
    milestone: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
        phase: "3"
        milestone: "2"
    spec:
      containers:
      - name: audit-service
        image: image-registry.openshift-image-registry.svc:5000/agentic-ops/audit-service:latest
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP
        env:
        - name: POSTGRES_HOST
          value: mlflow-db-rw.mlflow.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: mlflow-db-app
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-db-app
              key: password
        - name: POSTGRES_DB
          value: mlflow
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
