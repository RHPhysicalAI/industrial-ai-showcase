apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: camera-adapter
  namespace: fleet-ops
  labels:
    app: camera-adapter
    phase: phase-1
spec:
  source:
    type: Git
    git:
      uri: https://github.com/RHPhysicalAI/industrial-ai-showcase.git
      ref: phase3
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: workloads/camera-adapter/container/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: camera-adapter:latest
  triggers:
    - type: ConfigChange
