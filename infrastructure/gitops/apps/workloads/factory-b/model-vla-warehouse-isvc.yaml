apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vla-warehouse
  namespace: factory-b
spec:
  predictor:
    model:
      modelFormat:
        name: vllm
      storageUri: hf://microsoft/Phi-3.5-mini-instruct
      resources:
        limits:
          nvidia.com/gpu: '1'
          cpu: '4'
          memory: 16Gi
        requests:
          nvidia.com/gpu: '1'
          cpu: '2'
          memory: 8Gi
