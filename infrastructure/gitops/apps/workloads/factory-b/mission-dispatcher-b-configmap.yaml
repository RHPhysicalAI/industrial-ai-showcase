apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-dispatcher-b-config
  namespace: factory-b
  labels:
    app: mission-dispatcher-b
    factory: factory-b
data:
  # Hub-internal Kafka — Factory B runs on the hub, no TLS needed.
  kafka.bootstrap.servers: "fleet-kafka-bootstrap.fleet-ops.svc:9092"
  kafka.security.protocol: "PLAINTEXT"
  # OpenVLA server with custom /act endpoint (same as companion host)
  vla.endpoint.url: "http://openvla-server.factory-b.svc.cluster.local:8000/act"
