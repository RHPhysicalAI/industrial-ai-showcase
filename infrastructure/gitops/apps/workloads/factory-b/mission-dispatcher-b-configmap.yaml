apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-dispatcher-b-config
  namespace: factory-b
  labels:
    app: mission-dispatcher-b
    factory: factory-b
data:
  # Hub-internal Kafka — Factory B runs on the hub, no TLS needed.
  kafka.bootstrap.servers: "fleet-kafka-bootstrap.fleet-ops.svc:9092"
  kafka.security.protocol: "PLAINTEXT"
  # KServe VLA endpoint - running on hub cluster
  # Using vLLM OpenAI-compatible API format
  vla.endpoint.url: "http://vla-warehouse-predictor.factory-b.svc.cluster.local/v1/chat/completions"
