apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-agent-brain.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "vllm-agent-brain.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: {{ .Values.service.name }}
  selector:
    {{- include "vllm-agent-brain.selectorLabels" . | nindent 4 }}