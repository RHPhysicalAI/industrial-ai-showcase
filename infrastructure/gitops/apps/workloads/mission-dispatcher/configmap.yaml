apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-dispatcher-config
  namespace: robot-edge
  labels:
    app: mission-dispatcher
data:
  # Hub cluster uses internal Kafka service (plaintext)
  # Companion SNO would use: fleet-kafka-bootstrap-fleet-ops.apps.<domain>:443 with SSL
  kafka.bootstrap.servers: "fleet-kafka-bootstrap.fleet-ops.svc:9092"
  kafka.security.protocol: "PLAINTEXT"
  # OpenVLA server with custom /act endpoint (same as companion host)
  vla.endpoint.url: "http://openvla-server.robot-edge.svc.cluster.local:8000/act"
