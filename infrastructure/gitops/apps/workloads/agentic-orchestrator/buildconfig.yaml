# This project was developed with assistance from AI tools.
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: agentic-orchestrator
  namespace: agentic-ops
  labels:
    app: agentic-orchestrator
    phase: phase-3
spec:
  output:
    to:
      kind: ImageStreamTag
      name: agentic-orchestrator:latest
  source:
    type: Git
    git:
      uri: https://github.com/RHPhysicalAI/industrial-ai-showcase.git
      ref: phase3
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
  - type: ConfigChange