# This project was developed with assistance from AI tools.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-orchestrator
  annotations:
    description: LangGraph-based agentic orchestrator with MLflow tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-orchestrator
  template:
    metadata:
      labels:
        app: agentic-orchestrator
      annotations:
        description: LangGraph-based agentic orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: orchestrator
        image: "image-registry.openshift-image-registry.svc:5000/agentic-ops/agentic-orchestrator:latest"
        imagePullPolicy: Always

        env:
        - name: VLLM_BASE_URL
          value: "http://vllm-agent-brain.agentic-ops.svc.cluster.local:8000/v1"
        - name: MCP_BASE_URL
          value: "http://mcp-mlflow-server.agentic-ops.svc.cluster.local:8080"
        - name: MCP_FLEET_URL
          value: "http://mcp-fleet-server.agentic-ops.svc.cluster.local:8080"
        - name: AUDIT_SERVICE_URL
          value: "http://audit-service.agentic-ops.svc.cluster.local:8090"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-bot-token
              key: token
        - name: GITHUB_REPO
          value: "RHPhysicalAI/industrial-ai-showcase"
        # Kafka for fleet events (Phase 3 Item #8)
        - name: KAFKA_BOOTSTRAP
          value: "grid-kafka-kafka-bootstrap.grid-ops-infra.svc.cluster.local:9092"
        # Llama Stack integration (Phase 3)
        - name: HIL_MODE
          value: "passthrough"  # Options: "passthrough" (default) | "llama_stack"
        - name: LLAMA_STACK_URL
          value: "http://llama-stack-hil-service.agentic-ops.svc.cluster.local:8321"
        # Content moderation (Phase 3 - ADR-019)
        - name: MODERATION_ENDPOINT
          value: "http://llama-guard-adapter.agentic-ops.svc.cluster.local:8080/v1/moderations"
        - name: MODERATION_ENABLED
          value: "true"  # Set to "false" to disable guardrails
        - name: MODERATION_TIMEOUT
          value: "10.0"  # Timeout in seconds
        - name: MODERATION_MAX_RETRIES
          value: "2"  # Max retry attempts

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3