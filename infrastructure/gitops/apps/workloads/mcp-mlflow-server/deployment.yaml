# This project was developed with assistance from AI tools.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-mlflow-server
  annotations:
    description: Mock MCP server for MLflow tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-mlflow-server
  template:
    metadata:
      labels:
        app: mcp-mlflow-server
      annotations:
        description: Mock MCP server for MLflow tools
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: mcp-server
        image: "image-registry.openshift-image-registry.svc:5000/agentic-ops/mcp-mlflow-server:latest"
        imagePullPolicy: Always

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
