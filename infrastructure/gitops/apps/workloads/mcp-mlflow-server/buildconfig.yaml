# This project was developed with assistance from AI tools.
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mcp-mlflow-server
  namespace: agentic-ops
  labels:
    app: mcp-mlflow-server
    phase: phase-3
spec:
  output:
    to:
      kind: ImageStreamTag
      name: mcp-mlflow-server:latest
  source:
    type: Git
    git:
      uri: https://github.com/RHPhysicalAI/industrial-ai-showcase.git
      ref: phase3
    contextDir: infrastructure/gitops/apps/workloads/mcp-mlflow-server
    sourceSecret:
      name: git-source-secret
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
  - type: ConfigChange