# Force all Nucleus pods onto the same node (NVIDIA RWO PVC constraint).
# See README.md topology section + KNOWN-ISSUES.md §5.
# nucleus-api is the anchor (no affinity), all others co-locate with it.
---
# nucleus-api: NO affinity - schedules first as the anchor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucleus-auth
  namespace: omniverse-nucleus
spec:
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nucleus-api
              topologyKey: kubernetes.io/hostname
---
