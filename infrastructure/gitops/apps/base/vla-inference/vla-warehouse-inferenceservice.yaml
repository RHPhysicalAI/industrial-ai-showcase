# This project was developed with assistance from AI tools.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vla-warehouse
spec:
  predictor:
    # Target L40S GPU class (L4 nodes not yet provisioned)
    # TODO: Switch to L4 when available per GPU resource planning
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L40S
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: L40S_SHARED
        effect: NoSchedule
    model:
      modelFormat:
        name: vllm
      # Default storageUri - overlays will patch this
      storageUri: s3://mlflow/models/vla-warehouse/v1.0
      runtime: vllm-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "4"
          memory: 16Gi
        requests:
          nvidia.com/gpu: "1"
          cpu: "2"
          memory: 8Gi
