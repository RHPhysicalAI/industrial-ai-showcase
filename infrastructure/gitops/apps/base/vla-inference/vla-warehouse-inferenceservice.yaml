# This project was developed with assistance from AI tools.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vla-warehouse
spec:
  predictor:
    # Target L4 GPU class for VLA inference
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-L4
    model:
      modelFormat:
        name: vllm
      # Default storageUri - overlays will patch this
      storageUri: s3://mlflow/models/vla-warehouse/v1.0
      runtime: vllm-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "4"
          memory: 16Gi
        requests:
          nvidia.com/gpu: "1"
          cpu: "2"
          memory: 8Gi
